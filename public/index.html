<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fastmd-explorer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" id="hljs-theme" href="/vendor/hljs-light.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <span class="logo">fastmd-explorer</span>
      <div id="folder-bar">
        <div id="folder-input-wrap">
          <button id="btn-browse" title="フォルダを参照...">📂</button>
          <input
            type="text"
            id="folder-input"
            placeholder="フォルダパスを入力 (Enter で開く)..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="btn-open" title="フォルダを開く">開く</button>
        </div>
        <select id="history-select" title="履歴">
          <option value="">履歴 ▾</option>
        </select>
      </div>
      <div id="header-right">
        <button id="btn-font-down" title="文字を小さく">A-</button>
        <span id="font-size-label" title="クリックでリセット">16px</span>
        <button id="btn-font-up" title="文字を大きく">A+</button>
        <button id="btn-refresh" title="ファイルツリーを再読み込み (Ctrl+R)">↺</button>
        <button id="btn-theme" title="テーマ切替">◐</button>
      </div>
    </header>

    <!-- Warning bar -->
    <div id="warning-bar" class="hidden"></div>

    <!-- Main layout -->
    <div id="main">

      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-top">
          <input
            type="text"
            id="search-input"
            placeholder="ファイル検索... (Ctrl+F)"
            autocomplete="off"
          >
          <button id="btn-fulltext" title="全文検索 (Ctrl+G)">🔍</button>
          <button id="btn-show-images" title="画像を表示/非表示">🖼</button>
        </div>
        <div id="fulltext-panel" class="hidden">
          <input
            type="text"
            id="fulltext-input"
            placeholder="全文検索..."
            autocomplete="off"
            spellcheck="false"
          >
          <div id="fulltext-results"></div>
        </div>
        <div id="tag-filter-bar" class="hidden"></div>
        <div id="file-tree-wrap">
          <div id="file-tree"></div>
        </div>
        <div id="recent-files-panel"></div>
        <div id="sidebar-footer"></div>
      </aside>

      <div id="resize-handle"></div>

      <!-- Content -->
      <div id="content">

        <!-- Tab bar (always present, hidden when no tabs) -->
        <div id="tab-bar" class="hidden"></div>

        <!-- No folder / no file selected -->
        <div id="empty-state">
          <div class="empty-icon">📂</div>
          <p>上部のパス入力欄でフォルダを選択してください</p>
          <p class="hint">Markdownファイルが一覧表示されます</p>
        </div>

        <!-- File view (shown when a file is active) -->
        <div id="file-view" class="hidden">

          <!-- File header -->
          <div id="file-header">
            <span id="file-breadcrumb"></span>
            <div id="file-actions">
              <button id="btn-flag" title="重要フラグ (Ctrl+I)">☆</button>
              <button id="btn-print" title="印刷 / PDF出力">⎙</button>
              <button id="btn-edit" title="編集 (Ctrl+E)">編集</button>
              <button id="btn-save" class="hidden" title="保存 (Ctrl+S)">保存</button>
              <button id="btn-discard" class="hidden" title="変更を破棄">破棄</button>
            </div>
          </div>

          <!-- File info bar -->
          <div id="file-info-bar"></div>

          <!-- Backlinks bar -->
          <div id="backlinks-bar" class="hidden"></div>

          <!-- Tags bar -->
          <div id="tags-bar">
            <div id="tags-list"></div>
            <input
              type="text"
              id="tag-input"
              placeholder="＋ タグ追加 (Enter)..."
              autocomplete="off"
            >
          </div>

          <!-- Note -->
          <div id="note-bar">
            <input
              type="text"
              id="note-input"
              placeholder="メモ..."
              autocomplete="off"
            >
          </div>

          <!-- In-page search bar -->
          <div id="find-bar" class="hidden">
            <input type="text" id="find-input" placeholder="ページ内検索..." autocomplete="off" spellcheck="false">
            <span id="find-count"></span>
            <button id="find-prev" title="前へ">↑</button>
            <button id="find-next" title="次へ">↓</button>
            <button id="find-close" title="閉じる (Esc)">✕</button>
          </div>

          <!-- Preview / Editor (split when editing) -->
          <div id="edit-area">
            <!-- Preview + Outline -->
            <div id="preview-panel">
              <article id="preview-content" class="markdown-body"></article>
              <nav id="outline-panel"></nav>
            </div>

            <!-- Editor -->
            <div id="editor-panel" class="hidden">
              <div id="editor-toolbar">
                <button data-cmd="bold"    title="太字 (Ctrl+B)"><b>B</b></button>
                <button data-cmd="italic"  title="斜体 (Ctrl+I)"><i>I</i></button>
                <button data-cmd="strike"  title="打ち消し">S̶</button>
                <span class="tb-sep"></span>
                <button data-cmd="h1"      title="見出し1">H1</button>
                <button data-cmd="h2"      title="見出し2">H2</button>
                <button data-cmd="h3"      title="見出し3">H3</button>
                <span class="tb-sep"></span>
                <button data-cmd="ul"      title="箇条書き">・</button>
                <button data-cmd="ol"      title="番号付きリスト">1.</button>
                <button data-cmd="check"   title="チェックリスト">☑</button>
                <span class="tb-sep"></span>
                <button data-cmd="link"    title="リンク">🔗</button>
                <button data-cmd="code"    title="インラインコード">`</button>
                <button data-cmd="codeblock" title="コードブロック">```</button>
                <button data-cmd="table"   title="テーブル挿入">⊞</button>
              </div>
              <textarea id="editor" spellcheck="false"></textarea>
            </div>
          </div>

        </div>

        <!-- Image viewer (shown when an image is active) -->
        <div id="image-view" class="hidden">
          <div id="image-view-header">
            <span id="image-breadcrumb"></span>
            <div id="image-actions">
              <button id="img-zoom-in"  title="拡大">＋</button>
              <button id="img-zoom-reset" title="リセット">1:1</button>
              <button id="img-zoom-fit"  title="フィット">⊡</button>
              <button id="img-open-tab" title="別タブで開く">↗</button>
            </div>
          </div>
          <div id="image-stage">
            <img id="image-display" alt="" draggable="false">
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- Drag & drop overlay -->
  <div id="drop-overlay" class="hidden">
    <div id="drop-message">
      <span class="drop-icon">📂</span>
      <span>フォルダをドロップして開く</span>
    </div>
  </div>

  <script src="/vendor/mermaid.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
